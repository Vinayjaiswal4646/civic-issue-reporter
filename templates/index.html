<!DOCTYPE html>
<html>
<head>
    <title>Civic Issues</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI';
            background: #f5f7fa;
        }

        header {
            background: #1e293b;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .container {
            width: 90%;
            margin: auto;
        }

        .btn {
            background: #3b82f6;
            color: white;
            padding: 10px 15px;
            border-radius: 6px;
            text-decoration: none;
            display: inline-block;
            margin: 10px 5px;
        }

        #map {
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        img {
            width: 100%;
            border-radius: 8px;
        }

        .status {
            font-weight: bold;
            margin-top: 5px;
        }

        .top-bar {
            margin: 10px 0;
        }
    </style>
</head>

<body>

<header>
    <h1>🚀 Civic Issue Reporter</h1>
</header>

<div class="container">

<!-- 🔥 TOP BAR -->
<div class="top-bar">
    <a href="/upload" class="btn">+ Report Issue</a>

    {% if session.get('user') %}
        <a href="/logout" class="btn">Logout</a>
    {% else %}
        <a href="/login" class="btn">Login</a>
    {% endif %}
</div>

<!-- 🗺️ MAP -->
<div id="map" style="height: 400px;"></div>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
var map = L.map('map').setView([28.6139, 77.2090], 5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
}).addTo(map);

var markers = [];

{% for issue in issues %}
    {% if issue[3] and issue[4] %}
        var marker = L.marker([
            parseFloat("{{ issue[3] }}"),
            parseFloat("{{ issue[4] }}")
        ])
        .addTo(map)
        .bindPopup("{{ issue[1] }}");

        markers.push(marker);
    {% endif %}
{% endfor %}

if (markers.length > 0) {
    var group = new L.featureGroup(markers);
    map.fitBounds(group.getBounds());
}
</script>

<h2>📋 Issues</h2>

<div class="grid">
{% for issue in issues %}
    <div class="card">
        <h3>{{ issue[1] }}</h3>

        <img src="{{ issue[2] }}">

        <p>📍 {{ issue[3] }}, {{ issue[4] }}</p>

        <!-- 🔥 STATUS -->
        <p class="status">Status: {{ issue[5] }}</p>

        <!-- 👍 VOTES -->
        <p>👍 Votes: {{ issue[6] }}</p>

        <!-- 🔥 UPVOTE BUTTON -->
        <a href="/upvote/{{ issue[0] }}" class="btn">Upvote</a>
    </div>
{% endfor %}
</div>

</div>

</body>
</html>
